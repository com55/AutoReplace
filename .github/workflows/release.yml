name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set project version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mvn -B org.codehaus.mojo:versions-maven-plugin:2.16.2:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false

      - name: Build
        run: mvn -B package

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: target/AutoReplace-*.jar
          generate_release_notes: true
